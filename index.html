function gestionarCookies() {
    return new Promise((resolve, reject) => {
        localStorage.getItem("cookiesDecididas");
       
     setTimeout(function() {   
      
        
      
        const banner = document.getElementById("cookie-banner");
        banner.style.display = "block";
        banner.style.animation = "banner 2s forwards";


        document.getElementById("btn-aceptar").onclick = () => {
            localStorage.setItem("cookiesDecididas", "aceptado");
            banner.style.display = "none";
            resolve("Usuario aceptó");
        };

        document.getElementById("btn-rechazar").onclick = () => {
            localStorage.setItem("cookiesDecididas", "rechazado");
            banner.style.display = "none";
            reject("Usuario rechazó");
        };
},1000)

    });
}

 
gestionarCookies()
    .then(res => console.log("Resultado positivo:", res))
    .catch(err => console.log("Resultado negativo:", err));
